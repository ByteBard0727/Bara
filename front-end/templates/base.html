{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Forge — Custom Software &amp; Automation{% endblock %}</title>
<meta name="description" content="{% block description %}Custom websites, applications, dashboards, and automation systems for growing businesses.{% endblock %}">
<meta name="theme-color" content="#0D2036">

<meta property="og:title" content="{% block og_title %}Forge{% endblock %}">
<meta property="og:description" content="{% block og_description %}Custom software and automation for growing businesses.{% endblock %}">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="{% static 'css/main.css' %}">
{% block extra_head %}{% endblock %}
</head>
<body>

{% include "partials/navbar.html" %}

{% block content %}{% endblock %}

{% include "partials/footer.html" %}

<button class="back-to-top" aria-label="Back to top">
  <i class="fa-solid fa-arrow-up" aria-hidden="true"></i>
</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}" defer></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
